name: Source Health Check

on:
  schedule:
    - cron: '0 12 * * 1'   # UTC 12:00 every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check source health
        run: node scripts/source-health.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/source-health.json site.yaml
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update source health log"
            git push
          fi
